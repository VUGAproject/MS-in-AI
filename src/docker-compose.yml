version: '3.8'

services:
  ros2-vnc:
    image: tiryoh/ros2-desktop-vnc:jazzy
    container_name: gazebo_robot_env
    ports:
      - "6080:80"
    volumes:
      - ./gazebo_controller:/workspace/src/gazebo_controller
    environment:
      - RESOLUTION=1920x1080
    command: >
      bash -c "
      sudo apt-get update && 
      sudo apt-get install -y ros-jazzy-ros-gz ros-jazzy-ros-gz-bridge ros-jazzy-ros-gz-sim ros-jazzy-xacro &&
      cd /workspace && 
      colcon build --symlink-install && 
      source install/setup.bash && 
      echo 'source /workspace/install/setup.bash' >> ~/.bashrc &&
      /startup.sh
      "
