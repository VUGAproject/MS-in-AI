# Map definition for Maze_hr
# Generated from maze_world.sdf geometry
# Walls approximated as axis-aligned bounding boxes (map_publisher uses fill_rectangle)
resolution: 0.05

# Map dimensions in meters (covers the full maze extent)
width: 12.0
height: 12.0

# Origin (bottom-left corner) in meters
origin_x: -6.0
origin_y: -6.0

# Wall definitions: [center_x, center_y, size_x, size_y]
# Derived from SDF link poses and sizes with yaw-rotated bounding boxes
walls:
  # Outer boundary walls (SDF: Wall_11_clone vertical at x=-4.44, Wall_7 vertical at x=2.90)
  # Wall_11_clone: pose=(-4.44, 0.74), yaw=-1.571(vertical), size=7.43x0.15
  - [-4.44, 0.74, 0.15, 7.43]
  # Wall_7: pose=(2.90, 0.74), yaw=1.571(vertical), size=7.42x0.15
  - [2.90, 0.74, 0.15, 7.42]
  # Wall_6_clone: pose=(-0.72, 4.38), yaw=0(horizontal), size=7.42x0.15
  - [-0.72, 4.38, 7.42, 0.15]
  # Wall_6: pose=(-0.79, -2.89), yaw=0(horizontal), size=7.35x0.15
  - [-0.79, -2.89, 7.35, 0.15]

  # Inner walls (approximate bounding boxes for angled walls)
  # Wall_1: pose=(-3.0, 0.0), yaw=1.307, size=4.0x0.15 → roughly diagonal
  - [-3.0, 0.0, 1.2, 4.0]
  # Wall_2: pose=(-3.0, 1.0), yaw=1.294, size=4.0x0.15 → roughly diagonal
  - [-3.0, 1.0, 1.2, 4.0]
  # Wall_3: pose=(-1.0, 1.0), yaw=2.019, size=5.0x0.15 → roughly diagonal
  - [-1.0, 1.0, 3.2, 4.0]
  # Wall_4: pose=(0.0, 2.0), yaw=2.029, size=4.0x0.15 → roughly diagonal
  - [0.0, 2.0, 2.6, 3.2]
  # Wall_5: pose=(0.0, -2.0), yaw=0.165, size=4.0x0.15 → nearly horizontal
  - [0.0, -2.0, 4.0, 0.65]
  # Wall_8: pose=(1.0, 2.5), yaw=1.571(vertical), size=1.0x0.15
  - [1.0, 2.5, 0.15, 1.0]
  # Wall_9: pose=(1.0, 3.5), yaw=0(horizontal), size=1.0x0.15
  - [1.0, 3.5, 1.0, 0.15]
  # Wall_10: pose=(0.0, 3.0), yaw=0(horizontal), size=1.0x0.15
  - [0.0, 3.0, 1.0, 0.15]
